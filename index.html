<!DOCTYPE html>

<meta charset="UTF-8">
<title>Donghua Recommender Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f19;
  color: white;
}

header {
  background: #111827;
  padding: 15px;
  text-align: center;
  font-size: 26px;
  color: #38bdf8;
  font-weight: bold;
}

.filter {
  text-align: center;
  margin: 20px;
}

button {
  padding: 8px 15px;
  margin: 5px;
  border: none;
  border-radius: 20px;
  background: #38bdf8;
  cursor: pointer;
}

.container {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 30px;
}

.card {
  background: #111827;
  border-radius: 20px;
  overflow: hidden;
  transition: 0.3s;
  cursor: pointer;
  position: relative;
}

.card:hover {
  transform: scale(1.07);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.info {
  padding: 10px;
  text-align: center;
}

.genre {
  font-size: 12px;
  color: #94a3b8;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 99;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

.modal-content {
  background: #111827;
  margin: 5% auto;
  padding: 20px;
  width: 80%;
  border-radius: 20px;
}

.modal-content {
  background: #111;
  margin: 3% auto;
  padding: 20px;
  width: 70%;        /* lebih kecil dari sebelumnya */
  max-width: 900px;  /* biar nggak terlalu lebar */
  border-radius: 15px;
}
.close {
  float: right;
  font-size: 25px;
  cursor: pointer;
}

video {
  width: 100%;
  max-height: 400px;   /* batasi tinggi */
  object-fit: cover;   /* biar rapi */
  border-radius: 10px;
}
iframe {
  width: 100%;
  height: 400px;
  border-radius: 10px;
} 
</style>

function searchMovie() {
  const keyword = document.getElementById("search").value.toLowerCase();

  const filtered = movies.filter(movie =>
    movie.title.toLowerCase().includes(keyword)
  );

  displayMovies(filtered);
} 

function displayMovies(list) {
  const container = document.getElementById("movies");
  container.innerHTML = "";

  list.forEach(movie => {
    const div = document.createElement("div");
    div.className = "card";

    div.onclick = () => openModal(movie);

    div.innerHTML = `
      <img src="${movie.image}">
      <div class="info">
        <h4>${movie.title}</h4>
        <div class="genre">${movie.genre.join(", ")}</div>
      </div>
    `;

    container.appendChild(div);
  });
}

function filterGenre(genre) {
  if (genre === "All") {
    displayMovies(movies);
  } else {
    const filtered = movies.filter(m => m.genre.includes(genre));
    displayMovies(filtered);
  }
}

function openModal(movie) {
  document.getElementById("modal").style.display = "block";
  document.getElementById("title").innerText = movie.title;
  document.getElementById("genre").innerText = movie.genre.join(", ");
  document.getElementById("desc").innerText = movie.desc;
  document.getElementById("rating").innerText = movie.rating;

  const video = document.getElementById("trailer");
  video.src = movie.trailer;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("trailer").pause();
}

// Load awal
